name: iHunyuan
options:
  bundleIdPrefix: world.hanley
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    from: "0.9.0"
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.3.0"

targets:
  iHunyuan:
    type: application
    platform: iOS
    sources:
      - path: iHunyuan
    resources:
      - path: iHunyuan/Resources/Assets.xcassets
    info:
      path: iHunyuan/Info.plist
      properties:
        CFBundleDisplayName: iHunyuan
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        ITSAppUsesNonExemptEncryption: false
        NSSiriUsageDescription: "iHunyuan uses Siri so you can translate text by voice."
    entitlements:
      path: iHunyuan/iHunyuan.entitlements
      properties:
        com.apple.developer.siri: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: world.hanley.hunyuan
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftHuggingFace
        product: HuggingFace
      - package: SwiftTransformers
        product: Tokenizers

schemes:
  iHunyuan:
    build:
      targets:
        iHunyuan: all
    run:
      config: Debug
    archive:
      config: Release
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
